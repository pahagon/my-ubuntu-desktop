---
- name: Install VirtualBox on Ubuntu Desktop
  hosts: localhost
  become: true  # Use sudo privileges

  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install prerequisites for VirtualBox
      apt:
        name:
          - wget
          - gnupg
        state: present

    - name: Add Oracle VirtualBox repository key
      apt_key:
        url: https://www.virtualbox.org/download/oracle_vbox_2016.asc
        state: present

    - name: Add Oracle VirtualBox repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
        state: present

    - name: Update apt cache after adding VirtualBox repository
      apt:
        update_cache: yes

    - name: Get linux kernel release
      command: uname -r
      register: kernel_release
      changed_when: false

    - name: Install dkms and kernel headers
      apt:
        name:
          - dkms
          - linux-headers-{{ kernel_release.stdout }}
        state: present

    - name: Install VirtualBox
      apt:
        name: virtualbox-7.0
        state: present
      notify: Rebuild VirtualBox kernel modules

    - name: Verify VirtualBox installation
      command: vboxmanage --version
      register: vbox_version
      changed_when: false
      failed_when: vbox_version.rc != 0

  handlers:
    - name: Rebuild VirtualBox kernel modules
      command: /sbin/vboxconfig
      # Recompila o módulo vboxdrv para o kernel atual.
      # O DKMS faz isso automaticamente em atualizações de kernel,
      # mas é necessário forçar na primeira instalação.
